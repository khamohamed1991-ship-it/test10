<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Generated | Mosko Cheats</title>

    <style>
        :root{
            --bg:#000000;
            --card:#121212;
            --text:#ffffff;
            --accent:#00ff88;
            --error:#ff4444;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:var(--bg);
            color:var(--text);
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:420px;
            text-align:center;
        }

        #mainContainer{
            display:none;
        }

        #bypassContainer{
            display:none;
        }

        .key-icon{
            background:#1a1a1a;
            width:90px;
            height:90px;
            border-radius:50%;
            margin:0 auto 20px;
            display:flex;
            justify-content:center;
            align-items:center;
            border:1px solid #333;
            overflow:hidden;
            box-shadow:0 0 25px rgba(0,255,136,.15);
        }

        .key-icon img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        h1{
            font-size:28px;
            margin-bottom:8px;
        }

        .subtitle{
            color:#888;
            margin-bottom:25px;
            font-size:14px;
        }

        .card{
            background:var(--card);
            border:1px solid #222;
            border-radius:28px;
            padding:35px 28px;
            box-shadow:0 15px 50px rgba(0,0,0,.5);
        }

        h2{
            color:var(--accent);
            margin-bottom:12px;
        }

        .card-p{
            color:#999;
            line-height:1.6;
            margin-bottom:25px;
            font-size:14px;
        }

        .key-box{
            background:#000;
            border:1px dashed var(--accent);
            border-radius:18px;
            padding:20px;
            margin-bottom:20px;
        }

        #finalKey{
            color:var(--accent);
            font-family:Courier New, monospace;
            font-size:18px;
            font-weight:bold;
            letter-spacing:1px;
        }

        .btn{
            width:100%;
            padding:18px;
            border:none;
            border-radius:16px;
            background:#fff;
            color:#000;
            font-weight:bold;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            transform:scale(1.03);
            background:var(--accent);
        }

        .error-card{
            background:#1a0a0a;
            border:1px solid #441111;
            border-radius:25px;
            padding:35px;
        }

        .error-icon{
            font-size:50px;
            margin-bottom:15px;
        }

        .error-title{
            color:var(--error);
            font-size:24px;
            margin-bottom:15px;
            font-weight:bold;
        }

        .btn-red{
            margin-top:20px;
            background:var(--error);
            color:#fff;
        }

        .footer{
            margin-top:50px;
            color:#444;
            font-size:10px;
            letter-spacing:2px;
        }
    </style>
</head>

<body>

<div class="container">

    <div id="mainContainer">

        <div class="key-icon">
            <img src="./assets/logo.png" alt="Mosko Cheats">
        </div>

        <h1>Access Unlocked</h1>
        <p class="subtitle">Your device-locked license key is ready.</p>

        <div class="card">

            <h2>Generation Success!</h2>

            <p class="card-p">
                This key is locked to your device. Share it, and it won't work for others.
            </p>

            <div class="key-box">
                <span id="finalKey">SECURE FETCHING...</span>
            </div>

            <button class="btn" id="copyBtn" onclick="copyKey()">
                COPY TO CLIPBOARD
            </button>

        </div>

    </div>

    <div id="bypassContainer">

        <div class="error-card">

            <div class="error-icon">🚫</div>

            <div class="error-title">
                Access Denied
            </div>

            <p style="color:#ccc;line-height:1.6;">
                Please complete the official key system before accessing this page.
            </p>

            <button class="btn btn-red" onclick="history.back()">
                GO BACK
            </button>

        </div>

    </div>

</div>

<script>

async function checkSecurity(){

    const urlParams = new URLSearchParams(window.location.search);

    const source = urlParams.get("source");

    const referrer = document.referrer;

    if(
        source==="official" ||
        referrer.includes("short-jambo.ink") ||
        referrer.includes("lootdest.org") ||
        referrer.includes("steps.html")
    ){

        if(source==="official"){
            const cleanUrl=
                window.location.protocol+
                "//"+
                window.location.host+
                window.location.pathname;

            window.history.replaceState({},document.title,cleanUrl);
        }

        document.getElementById("mainContainer").style.display="block";

        generateLockedKey();

    }else{

        document.getElementById("bypassContainer").style.display="block";

    }

}

async function generateLockedKey(){

    try{

        const response=await fetch("https://api.ipify.org?format=json");

        const data=await response.json();

        const ip=data.ip;

        const day=Math.floor(Date.now()/86400000);

        const ipSeed=parseInt(ip.replace(/\./g,"").substring(0,6));

        let seed=ipSeed+day+2026;

        function rnd(){

            let x=Math.sin(seed++)*10000;

            return Math.abs(x-Math.floor(x));

        }

        const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

        let segments=[];

        for(let i=0;i<4;i++){

            let s="";

            for(let j=0;j<4;j++){

                s+=chars.charAt(Math.floor(rnd()*chars.length));

            }

            segments.push(s);

        }

        document.getElementById("finalKey").innerText=
            "UKM-"+segments.join("-");

    }catch(e){

        document.getElementById("finalKey").innerText=
            "CONNECT TO INTERNET";

    }

}

function copyKey(){

    const key=document.getElementById("finalKey").innerText;

    if(
        key.includes("SECURE") ||
        key.includes("CONNECT")
    ) return;

    navigator.clipboard.writeText(key).then(()=>{

        const btn=document.getElementById("copyBtn");

        btn.innerText="COPIED SUCCESSFULLY! ✅";

        btn.style.background="#00ff88";

        setTimeout(()=>{

            btn.innerText="COPY TO CLIPBOARD";

            btn.style.background="#ffffff";

        },2000);

    });

}

window.onload=checkSecurity;

</script>

</body>
</html>
